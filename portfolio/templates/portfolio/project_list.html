{% extends 'portfolio/base.html' %}
{% load static %}

{% block content %}

<section class="py-5">
    <div class="container">

        <div class="text-center mb-5">
            <h2 class="section-title">All Projects</h2>
            <p class="text-muted">Explore complete portfolio projects.</p>
        </div>

        <div class="row">
            {% for project in projects %}
                <div class="col-md-4 mb-4">
                    <div class="card project-card h-100">

                        <img src="{{ project.thumbnail.url }}" class="card-img-top">

                        <div class="card-body">
                            <h5 class="fw-bold">{{ project.title }}</h5>
                            <p class="text-muted">{{ project.short_description }}</p>

                            <a href="{% url 'project_detail' project.slug %}" 
                               class="btn btn-outline-dark btn-sm rounded-pill">
                               View Case Study →
                            </a>
                        </div>

                    </div>
                </div>
            {% empty %}
                <p class="text-center">No projects available.</p>
            {% endfor %}
        </div>

    </div>
</section>

{% endblock %}
