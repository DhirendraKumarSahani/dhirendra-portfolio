{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dhirendra Kumar | AI Engineer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'css/project_detail.css' %}">

    <link rel="stylesheet" href="{% static 'css/about.css' %}">

    <link rel="stylesheet" href="{% static 'css/project_list.css' %}">

    <link rel="stylesheet" href="{% static 'css/contact.css' %}">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">

    {% block extra_css %}{% endblock %}

</head>

<body>

<nav class="main-navbar">
    <div class="container nav-wrapper">

        <!-- LEFT -->
        <div class="nav-left">
            <a href="/" class="brand-name">
                <span class="brand-first">Dhirendra</span>
                <span class="brand-last">Kumar</span>
            </a>
        </div>

        <!-- RIGHT -->
        <div class="nav-right">
            <a href="/about/" class="nav-link">About</a>
            <a href="/projects/" class="nav-link">Projects</a>
            <a href="/contact/" class="nav-link">Contact</a>

            
            <a href="{% load static %}{% static 'resume/dhirendra_resume.pdf' %}"
            target="_blank"
            download
            class="nav-cta">
                Download Resume
            </a>
        </div>

    </div>
</nav>

{% block content %}{% endblock %}

<div class="footer">
    © 2026 Dhirendra Kumar — AI Systems Engineer
</div>

<script>
window.addEventListener("scroll", function() {
    const navbar = document.querySelector(".main-navbar");
    navbar.classList.toggle("scrolled", window.scrollY > 20);
});
</script>

</body>
</html>
